name: DoomHelix Release

on:
  push:
    tags:
      - 'v*'
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-grammars:
    name: Fetch Grammars
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Fetch tree-sitter grammars
        run: cargo run --package=helix-loader --bin=hx-loader

      - name: Bundle grammars
        run: tar cJf grammars.tar.xz -C runtime/grammars/sources .

      - uses: actions/upload-artifact@v7
        with:
          name: doomhelix-grammars
          path: grammars.tar.xz

  dist:
    name: Dist ${{ matrix.target }}
    needs: [fetch-grammars]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            binary: target/release/dhx
            checksum: sha256sum
          - os: macos-13
            target: x86_64-apple-darwin
            binary: target/x86_64-apple-darwin/release/dhx
            checksum: shasum -a 256
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: target/aarch64-apple-darwin/release/dhx
            checksum: shasum -a 256
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Download grammars
        uses: actions/download-artifact@v8
        with:
          name: doomhelix-grammars

      - name: Move grammars under runtime
        shell: bash
        run: |
          mkdir -p runtime/grammars/sources
          tar xJf grammars.tar.xz -C runtime/grammars/sources

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Build DoomHelix
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-22.04" ]; then
            cargo build --release -p helix-term --bin dhx
          else
            cargo build --release --target "${{ matrix.target }}" -p helix-term --bin dhx
          fi

      - name: Package
        shell: bash
        run: |
          set -euxo pipefail
          version="${GITHUB_REF_NAME:-dev}"
          version="${version#v}"
          package="doom-helix-${version}-${{ matrix.target }}"
          mkdir -p "dist/${package}"
          cp "${{ matrix.binary }}" "dist/${package}/dhx-bin"
          cp README.md LICENSE install.sh "dist/${package}/"
          rm -rf runtime/grammars/sources
          cp -r runtime "dist/${package}/runtime"
          tar -C dist -czf "dist/${package}.tar.gz" "${package}"
          (cd dist && ${{ matrix.checksum }} "${package}.tar.gz" > "${package}.tar.gz.sha256")

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: doom-helix-${{ matrix.target }}
          path: dist/*.tar.gz*

  publish:
    name: Publish
    needs: [dist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8

      - name: Collect release files
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p dist
          find . -type f \( -name '*.tar.gz' -o -name '*.tar.gz.sha256' \) -exec cp {} dist/ \;

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*
